name: Reusable Website Monitor

on:
  workflow_call:
    inputs:
      homepage_url:
        required: true
        type: string
      alert_email_to:
        required: false
        type: string
        default: ""
      alert_email_from:
        required: false
        type: string
        default: ""
      email_mode:
        required: false
        type: string
        default: "changes_only"
    secrets:
      RESEND_API_KEY:
        required: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      WEBSITE_MONITOR_ROOT: ${{ github.workspace }}

    steps:
      - name: Check out caller repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}

      - name: Check out monitor engine
        uses: actions/checkout@v6
        with:
          repository: kyle-consults/internal-website-monitor-engine
          ref: main
          path: _monitor_engine

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r _monitor_engine/requirements.txt
          pip install ./_monitor_engine

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scanner
        env:
          HOMEPAGE_URL: ${{ inputs.homepage_url }}
        run: |
          python -m website_monitor

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports snapshots
          git diff --cached --quiet || git commit -m "Automated website scan"
          git push

      - name: Send email notification
        if: ${{ inputs.alert_email_to != '' && inputs.alert_email_from != '' && env.RESEND_API_KEY != '' }}
        env:
          ALERT_EMAIL_TO: ${{ inputs.alert_email_to }}
          ALERT_EMAIL_FROM: ${{ inputs.alert_email_from }}
          EMAIL_MODE: ${{ inputs.email_mode }}
        run: |
          python -m website_monitor.notify
